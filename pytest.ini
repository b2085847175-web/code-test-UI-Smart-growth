[pytest]
# 测试路径
testpaths = tests

# 默认执行参数
addopts =
    -v
    --strict-markers
    --alluredir=reports
    --clean-alluredir

# Python 文件匹配模式
python_files = test_*.py

# Python 类匹配模式
python_classes = Test*

# Python 函数匹配模式
python_functions = test_*

# 自定义标记
markers =
    smoke: 冒烟测试
    regression: 回归测试
    login: 登录相关测试
