[pytest]
# 测试路径
testpaths = tests

# Python 文件匹配模式
python_files = test_*.py

# Python 类匹配模式
python_classes = Test*

# Python 函数匹配模式
python_functions = test_*

# 并行执行配置 (pytest-xdist)
# -n 1: 单线程执行，避免多浏览器混乱
# addopts =
#    -v
#    --strict-markers
#    --reruns=2
#    --reruns-delay=1
#    --alluredir=reports
#    --clean-alluredir
#    -n 1

# 失败重试配置 (pytest-rerunfailures)
# 失败重试次数
reruns = 2
# 重试间隔（秒）
reruns_delay = 1

# 自定义标记
markers =
    smoke: 冒烟测试
    regression: 回归测试
    login: 登录相关测试
